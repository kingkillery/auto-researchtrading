name: Fly Docker Contract

on:
  pull_request:
    paths:
      - ".github/workflows/fly-docker-contract.yml"
      - "Dockerfile"
      - "fly_entrypoint.py"
      - "workbench_auth.py"
      - "fly.toml"
      - "docs/agent-harness.md"
      - "docs/fly-runtime-manifest.json"
      - "tests/test_fly_docker_contract.py"
      - "tests/test_fly_auth.py"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/fly-docker-contract.yml"
      - "Dockerfile"
      - "fly_entrypoint.py"
      - "workbench_auth.py"
      - "fly.toml"
      - "docs/agent-harness.md"
      - "docs/fly-runtime-manifest.json"
      - "tests/test_fly_docker_contract.py"
      - "tests/test_fly_auth.py"

jobs:
  verify-fly-docker-contract:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: python -m pip install uv

      - name: Sync runtime dependencies
        run: uv sync --frozen --no-dev

      - name: Verify Fly Docker contract and auth
        run: uv run python -m unittest tests.test_fly_docker_contract tests.test_fly_auth
